name: Publish npm package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Build and stage binary
        run: npm run prepare:binary

      - name: Detect staged platform
        id: platform
        shell: bash
        run: echo "name=$(node -p 'process.platform + "-" + process.arch')" >> "$GITHUB_OUTPUT"

      - name: Upload staged binary
        uses: actions/upload-artifact@v6
        with:
          name: prebuilt-${{ steps.platform.outputs.name }}
          path: prebuilt/${{ steps.platform.outputs.name }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds

      - uses: actions/download-artifact@v7
        with:
          pattern: prebuilt-*
          path: prebuilt-artifacts

      - name: Assemble prebuilt binaries
        shell: bash
        run: |
          rm -rf prebuilt
          mkdir -p prebuilt
          for artifact in prebuilt-artifacts/prebuilt-*; do
            platform="${artifact##*/prebuilt-}"
            mkdir -p "prebuilt/$platform"

            if [ -d "$artifact/$platform" ]; then
              cp -R "$artifact/$platform/." "prebuilt/$platform/"
            else
              find "$artifact" -maxdepth 1 -type f -exec cp {} "prebuilt/$platform/" \;
            fi
          done

          find prebuilt -type f ! -name '*.exe' -exec chmod 755 {} \;

      - name: Check npm version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "$package_name@$package_version" version > /dev/null 2>&1; then
            echo "::error::$package_name@$package_version already exists on npm. Bump package.json before merging to main."
            exit 1
          fi
      - name: Verify package contents
        run: npm pack --dry-run
      - name: Publish package
        run: npm publish
